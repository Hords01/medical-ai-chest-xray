# ============================================================
# Multi-Class Classification Configuration
# Open-Source Chest X-Ray Dataset (4 Classes)
# ============================================================
# Usage: python train.py --config config_multiclass.yaml
# ============================================================

experiment:
  name: "chest_xray_multiclass"
  description: "4-class classification: COVID-19, Normal, Pneumonia, Tuberculosis"
  output_dir: "./experiments/"

data:
  train_data_path: "./data/chest_xray/train"
  test_data_path: "./data/chest_xray/test"
  val_data_path: "./data/chest_xray/val"
  num_classes: 4
  class_names: ["COVID-19", "Normal", "Pneumonia", "Tuberculosis"]
  image_size: 299
  format: "imagefolder"

model:
  architecture: "googlenet"
  pretrained: false               # Train from scratch for architecture comparison
  freeze_backbone: false
  dropout_rate: 0.0
  auxiliary_outputs: true          # GoogLeNet auxiliary classifiers

training:
  epochs: 10
  batch_size: 32
  learning_rate: 0.001
  optimizer: "adam"
  criterion: "cross_entropy"
  auxiliary_loss_weight: 0.4       # loss = main + 0.4 × auxiliary
  shuffle_train: true
  shuffle_test: false
  num_workers: 4

preprocessing:
  normalize: true
  normalize_mean: [0.5, 0.5, 0.5]
  normalize_std: [0.5, 0.5, 0.5]
  random_horizontal_flip: false    # Minimal augmentation for from-scratch comparison
  random_vertical_flip: false
  random_rotation: 0
  center_crop: false
  random_resized_crop:
    enabled: false
  color_jitter: false
  gaussian_blur: false
  random_erasing: false
  random_affine:
    enabled: false
  padding:
    enabled: false

medical_imaging:
  enabled: false

checkpoint:
  strategy: "best_and_latest"
  save_only_simple_best: true
  save_only_simple_latest: true
  cleanup_old_best: true

model_selection:
  strategy: "single_metric"
  primary_metric: "f1_score"       # F1 handles class imbalance better than accuracy

logging:
  tensorboard: true
  tensorboard_dir: "./runs/"
  confusion_matrix: true
  confusion_matrix_every_epoch: true  # Track class confusion across epochs
  per_class_metrics: true             # Important for imbalanced multi-class
  export_formats: ["json", "csv", "xlsx"]
  auto_readme: true
  epoch_snapshots: false

reproducibility:
  seed: 42
  deterministic: true
  benchmark: false
