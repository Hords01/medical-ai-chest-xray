# ============================================================
# Medical Imaging Configuration
# DICOM Chest CT with Windowing and CLAHE Enhancement
# ============================================================
# Usage: python train.py --config config_medical.yaml
# ============================================================

experiment:
  name: "lung_ct_classification"
  description: "Binary classification on DICOM CT scans with medical preprocessing"
  output_dir: "./experiments/"

data:
  train_data_path: "./data/lung_ct/train"
  test_data_path: "./data/lung_ct/test"
  val_data_path: "./data/lung_ct/val"
  num_classes: 2
  class_names: ["Normal", "Abnormal"]
  image_size: 224
  format: "imagefolder"

model:
  architecture: "resnet50"
  pretrained: true
  pretrained_weights: "IMAGENET1K_V1"
  freeze_backbone: true
  dropout_rate: 0.2
  auxiliary_outputs: false

training:
  epochs: 50
  batch_size: 16                         # Smaller batch for larger DICOM images
  learning_rate: 0.0001
  optimizer: "adam"
  criterion: "cross_entropy"
  shuffle_train: true
  shuffle_test: false
  num_workers: 4

preprocessing:
  normalize: true
  normalize_mean: [0.485, 0.456, 0.406]  # ImageNet stats for pretrained models
  normalize_std: [0.229, 0.224, 0.225]
  random_horizontal_flip: true
  random_vertical_flip: false
  random_rotation: 15
  center_crop: false
  random_resized_crop:
    enabled: true
    size: 224
    scale: [0.85, 1.0]
    ratio: [0.9, 1.1]
  color_jitter: false                    # Not appropriate for medical images
  gaussian_blur: false
  random_erasing: false
  random_affine:
    enabled: true
    degrees: 10
    translate: [0.05, 0.05]
    scale: [0.95, 1.05]
    shear: 5
  padding:
    enabled: false

# --- Medical Imaging Preprocessing ---
# This is the key differentiator of the framework.
# Standard ML frameworks don't handle DICOM-specific preprocessing.
medical_imaging:
  enabled: true

  # Hounsfield Unit Windowing
  # DICOM pixel values range from -1000 to +3000 HU.
  # Windowing maps a specific range to 0-255 for visualization.
  #
  # Common presets:
  #   Lung:        center=-600, width=1500
  #   Soft tissue: center=40,   width=400
  #   Bone:        center=400,  width=1800
  #   Brain:       center=40,   width=80
  #   Liver:       center=60,   width=150
  windowing:
    enabled: true
    window_center: -600                  # Lung window
    window_width: 1500

  # CLAHE - Contrast Limited Adaptive Histogram Equalization
  # Enhances local contrast in low-contrast X-ray/CT images
  # without amplifying noise (unlike global histogram equalization)
  clahe:
    enabled: true
    clip_limit: 2.0                      # Contrast amplification limit
    tile_grid_size: [8, 8]               # Size of local regions

checkpoint:
  strategy: "best_and_latest"
  save_only_simple_best: true
  save_only_simple_latest: true
  cleanup_old_best: true

model_selection:
  strategy: "weighted"
  metrics:
    accuracy: 0.25
    f1_score: 0.25
    npv: 0.35                            # Emphasize NPV for medical screening
    auc_roc: 0.15

logging:
  tensorboard: true
  tensorboard_dir: "./runs/"
  confusion_matrix: true
  confusion_matrix_every_epoch: true     # Track learning progression
  per_class_metrics: true
  export_formats: ["json", "csv", "xlsx"]
  auto_readme: true
  epoch_snapshots: true                  # Full state dumps for research

reproducibility:
  seed: 42
  deterministic: true
  benchmark: false
